<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Marker AR Menu</title>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (let r of registrations) { r.unregister(); }
        });
      }
    </script>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #scan-hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            padding: 12px 22px;
            border-radius: 24px;
            pointer-events: none;
            transition: opacity 0.4s;
            white-space: nowrap;
            z-index: 10;
        }
        #scan-hint.hidden { opacity: 0; }
        #fallback-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 18px;
            border-radius: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            cursor: pointer;
            z-index: 10;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>
<body>
    <div id="scan-hint">Point camera at the menu marker</div>
    <a href="/" id="fallback-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      Back to Menu
    </a>

    <a-scene mindar-image="imageTargetSrc: ./menu-marker.mind; autoStart: true; uiLoading: no; filterMinCF: 0.001; filterBeta: 0.01; warmupTolerance: 3; missTolerance: 20;"
             color-space="sRGB"
             renderer="colorManagement: true; physicallyCorrectLights: true"
             vr-mode-ui="enabled: false"
             device-orientation-permission-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0">
        <a-entity id="ar-model"
                  gltf-model="./burger.glb"
                  position="0 0 0.1"
                  rotation="90 0 0"
                  scale="0.3 0.3 0.3">
        </a-entity>
      </a-entity>
    </a-scene>

    <script>
        const hint = document.getElementById('scan-hint');
        const scene = document.querySelector('a-scene');

        // Dynamically load the correct 3D model based on the URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const modelParam = urlParams.get('model');
        
        if (modelParam) {
            document.getElementById('ar-model').setAttribute('gltf-model', modelParam.startsWith('/') ? '.' + modelParam : './' + modelParam);
        }

        scene.addEventListener('targetFound', () => {
            hint.classList.add('hidden');
        });
        scene.addEventListener('targetLost', () => {
            hint.classList.remove('hidden');
        });
    </script>
</body>
</html>
